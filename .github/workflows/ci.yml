name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Verify
        run: ./gradlew clean check bootJar --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-reports
          path: |
            build/reports/
            build/test-results/
