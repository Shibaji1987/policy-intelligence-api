spring.application.name=policy-intelligence
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/policy_intelligence}
spring.datasource.username=${DB_USERNAME:policy}
spring.datasource.password=${DB_PASSWORD:policy}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.cache.type=${CACHE_TYPE:simple}
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
management.endpoints.web.exposure.include=health,info,metrics
management.prometheus.metrics.export.enabled=true
management.tracing.enabled=${TRACING_ENABLED:false}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
server.error.include-message=always
spring.threads.virtual.enabled=true
logging.pattern.level=%5p [requestId:%X{requestId:-}]
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.advisor.max-context-chunks=${ADVISOR_MAX_CONTEXT_CHUNKS:8}
app.advisor.context-token-budget=${ADVISOR_CONTEXT_TOKEN_BUDGET:1800}
app.advisor.max-chunks-per-document=${ADVISOR_MAX_CHUNKS_PER_DOCUMENT:3}
app.advisor.retrieval-top-k=${ADVISOR_RETRIEVAL_TOP_K:30}
app.advisor.reranked-limit=${ADVISOR_RERANKED_LIMIT:16}
app.advisor.parent-child-seed-limit=${ADVISOR_PARENT_CHILD_SEED_LIMIT:6}
app.ml.base-url=${ML_BASE_URL:http://127.0.0.1:8090}
app.ml.enabled=${ML_ENABLED:true}
app.embeddings.provider=${EMBEDDINGS_PROVIDER:local}
app.embeddings.max-backfill-batches=${EMBEDDINGS_MAX_BACKFILL_BATCHES:100}
app.embeddings.backfill-initial-delay=${EMBEDDINGS_BACKFILL_INITIAL_DELAY:PT5S}
app.embeddings.backfill-fixed-delay=${EMBEDDINGS_BACKFILL_FIXED_DELAY:PT24H}
app.embeddings.dimension=${EMBEDDINGS_DIMENSION:1536}
app.embeddings.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.embeddings.openai.api-key=${OPENAI_API_KEY:}
app.embeddings.openai.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
app.llm.enabled=${LLM_ENABLED:true}
app.llm.base-url=${LLM_BASE_URL:https://api.openai.com/v1}
app.llm.api-key=${OPENAI_API_KEY:}
app.llm.model=${LLM_MODEL:gpt-4o}
app.billing.strategy=${BILLING_STRATEGY:ESTIMATED_INPUT_ONLY}
app.billing.currency=${BILLING_CURRENCY:USD}
app.billing.input-usd-per-million-tokens=${BILLING_INPUT_USD_PER_MILLION_TOKENS:0}
app.billing.output-usd-per-million-tokens=${BILLING_OUTPUT_USD_PER_MILLION_TOKENS:0}
app.security.enabled=${SECURITY_ENABLED:false}
app.security.enforce-header-scopes=${SECURITY_ENFORCE_HEADER_SCOPES:true}
app.query-rewrite.llm-enabled=${QUERY_REWRITE_LLM_ENABLED:false}
app.query-rewrite.llm-confidence-threshold=${QUERY_REWRITE_LLM_CONFIDENCE_THRESHOLD:0.75}
app.query-expansion.max-queries=${QUERY_EXPANSION_MAX_QUERIES:3}
app.advisor.stream-session-ttl=${ADVISOR_STREAM_SESSION_TTL:PT5M}
app.retrieval.cache.backend=${RETRIEVAL_CACHE_BACKEND:LOCAL}
app.retrieval.cache.redis-prefix=${RETRIEVAL_CACHE_REDIS_PREFIX:policy-intelligence:retrieval:}
app.retrieval.cache.ttl=${RETRIEVAL_CACHE_TTL:PT30M}
app.query-expansion.domain-synonyms.contractor[0]=third party
app.query-expansion.domain-synonyms.contractor[1]=vendor
app.query-expansion.domain-synonyms.contractor[2]=external worker
app.query-expansion.domain-synonyms.vendor[0]=third party
app.query-expansion.domain-synonyms.vendor[1]=supplier
app.query-expansion.domain-synonyms.production[0]=production environment
app.query-expansion.domain-synonyms.production[1]=production data
app.query-expansion.policy-concepts.access[0]=approval requirements
app.query-expansion.policy-concepts.access[1]=evidence review
app.query-expansion.policy-concepts.approval[0]=risk acceptance
app.query-expansion.policy-concepts.approval[1]=manager approval
app.query-expansion.policy-concepts.customer-data[0]=sensitive customer data
app.query-expansion.policy-concepts.customer-data[1]=restricted data handling
app.query-expansion.acronyms.pii=personally identifiable information
app.query-expansion.acronyms.phi=protected health information
app.query-expansion.acronyms.mfa=multi factor authentication
app.query-expansion.acronyms.soc2=security compliance audit
app.query-expansion.metadata-terms[0]=department
app.query-expansion.metadata-terms[1]=region
app.query-expansion.metadata-terms[2]=classification
app.query-expansion.metadata-terms[3]=document type
rag.retrieval.fusion.rrf-k=${RAG_RETRIEVAL_FUSION_RRF_K:60}
